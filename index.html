<!doctype html>
<html lang="ur" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#022c22" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="جامعہ سسٹم" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>جامعہ تعلیم القرآن ناگمان - ڈیجیٹل مینجمنٹ سسٹم</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Probe if /sw.js is accessible directly or behind an authentication redirect (common in sandbox preview)
          fetch('/sw.js', { redirect: 'error' })
            .then((res) => {
              if (res.ok) {
                navigator.serviceWorker.register('/sw.js')
                  .then((reg) => console.log('Service Worker Registered!', reg.scope))
                  .catch((err) => console.warn('Service Worker registration failed:', err));
              } else {
                console.warn('Service Worker fetch returned status:', res.status);
              }
            })
            .catch((err) => {
              console.log('Service Worker registration bypassed: Script is behind a redirect proxy (typical in developmental sandbox environment). It will register successfully in standalone or production deployment.');
            });
        });
      }
    </script>
  </body>
</html>
