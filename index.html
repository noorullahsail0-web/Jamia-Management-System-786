<!doctype html>
<html lang="ur" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#022c22" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="جامعہ سسٹم" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>جامعہ تعلیم القرآن ناگمان - ڈیجیٹل مینجمنٹ سسٹم</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const registerSW = () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('Service Worker Registered Successfully!', reg.scope);
              // Force checking for updates immediately on load to detect changes fast
              if (reg.update) {
                reg.update().catch((err) => console.log('SW update check failed:', err));
              }
            })
            .catch((err) => {
              console.log('Service Worker registration bypassed or failed (expected in sandboxed preview iframe):', err);
            });
        };

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          registerSW();
        } else {
          window.addEventListener('load', registerSW);
        }
      }
    </script>
  </body>
</html>
