<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Globe Background with Grid -->
  <circle cx="300" cy="230" r="210" fill="#00AEEF" />
  <g stroke="white" stroke-width="0.5" opacity="0.6">
    <!-- Latitudes -->
    <ellipse cx="300" cy="230" rx="210" ry="60" fill="none" />
    <ellipse cx="300" cy="230" rx="210" ry="120" fill="none" />
    <ellipse cx="300" cy="230" rx="210" ry="180" fill="none" />
    <!-- Longitudes -->
    <ellipse cx="300" cy="230" rx="60" ry="210" fill="none" />
    <ellipse cx="300" cy="230" rx="120" ry="210" fill="none" />
    <ellipse cx="300" cy="230" rx="180" ry="210" fill="none" />
    <line x1="300" y1="20" x2="300" y2="440" />
    <line x1="90" y1="230" x2="510" y2="230" />
  </g>

  <!-- Arabic "Iqra" Text at Top -->
  <path id="iqraPath" d="M200 100 Q 300 50 400 100" fill="none" />
  <text font-family="serif" font-size="85" font-weight="bold" fill="black">
    <textPath href="#iqraPath" startOffset="50%" text-anchor="middle">اقرأ </textPath>
  </text>

  <!-- Mihrab / Arch Structure (Layered) -->
  <path d="M300 160 C 380 250, 420 300, 420 370 C 420 400, 360 420, 300 420 C 240 420, 180 400, 180 370 C 180 300, 220 250, 300 160 Z" fill="#8CE0EF" stroke="#00AEEF" stroke-width="2" />
  <path d="M300 190 C 360 260, 390 300, 390 360 C 390 385, 345 400, 300 400 C 255 400, 210 385, 210 360 C 210 300, 240 260, 300 190 Z" fill="white" />

  <!-- Rays Circle -->
  <circle cx="300" cy="305" r="70" fill="#E0F7FA" opacity="0.5" />
  <g stroke="#00AEEF" stroke-width="0.8">
    <line x1="300" y1="235" x2="300" y2="375" />
    <line x1="230" y1="305" x2="370" y2="305" />
    <line x1="250" y1="255" x2="350" y2="355" />
    <line x1="350" y1="255" x2="250" y2="355" />
    <!-- More rays -->
    <line x1="275" y1="240" x2="325" y2="370" />
    <line x1="325" y1="240" x2="275" y2="370" />
  </g>

  <!-- Kaaba Icon -->
  <rect x="282" y="290" width="36" height="36" fill="black" />
  <path d="M282 298 H318" stroke="#FFD700" stroke-width="2" />

  <!-- Fountain Pen Nib -->
  <path d="M300 370 L320 410 L320 480 L280 480 L280 410 Z" fill="#00AEEF" />
  <path d="M300 370 V420" stroke="white" stroke-width="1.5" />

  <!-- Ribbon / Banner -->
  <path d="M30 400 L120 340 L300 420 L480 340 L570 400 L570 470 L480 410 L300 490 L120 410 L30 470 Z" fill="#00AEEF" stroke="#0072BC" stroke-width="1" />
  <path d="M120 340 L120 410 M480 340 L480 410" stroke="#0072BC" stroke-width="1" />
  
  <!-- Banner Text -->
  <text x="135" y="415" font-family="sans-serif" font-size="36" font-weight="900" fill="#231F20" transform="rotate(-21, 135, 415)">JAMIA TALEEM</text>
  <text x="445" y="400" font-family="sans-serif" font-size="34" font-weight="900" fill="#231F20" transform="rotate(21, 445, 400)">UL - QURAAN</text>

  <!-- Bottom Purple Arch -->
  <path d="M150 510 C 150 510, 300 450, 450 510 L 410 570 C 410 570, 300 515, 190 570 Z" fill="#C5C7E1" stroke="#9094B6" stroke-width="1" />
  <path id="urduPath" d="M180 550 Q 300 500 420 550" fill="none" />
  <text font-family="serif" font-size="34" font-weight="bold" fill="black">
    <textPath href="#urduPath" startOffset="50%" text-anchor="middle">جامعہ تعلیم القرآن ناگمان</textPath>
  </text>
</svg>
